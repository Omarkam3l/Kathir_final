plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.kathir_final"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.kathir_final"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.7.0"
}

// Stripe / AndroidX alignment for the app module only (applying this to every subproject slows Gradle badly).
configurations.configureEach {
    resolutionStrategy {
        force 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
        force 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.7'
        force 'androidx.lifecycle:lifecycle-viewmodel-savedstate:2.8.7'
        force 'androidx.lifecycle:lifecycle-runtime-compose:2.8.7'
        force 'androidx.lifecycle:lifecycle-livedata-ktx:2.8.7'
        force 'androidx.compose.foundation:foundation:1.6.8'
        force 'androidx.compose.material:material:1.6.8'
        force 'androidx.compose.ui:ui:1.6.8'
        force 'androidx.activity:activity-compose:1.9.3'
        force 'androidx.fragment:fragment-ktx:1.8.6'
    }
}
